name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Lint PHP receiver
        run: php -l phpush.php

      - name: ShellCheck client + tests
        run: shellcheck --severity=warning phpush tests/run.sh

      - name: Integration tests
        run: bash tests/run.sh
