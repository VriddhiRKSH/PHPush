name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'

      - name: Lint PHP receiver
        run: php -l phpush.php

      - name: ShellCheck client + tests
        run: shellcheck --severity=warning phpush tests/run.sh tests/git.sh tests/modes.sh tests/security.sh

      - name: Integration tests (working-tree mode)
        run: bash tests/run.sh

      - name: Integration tests (--git mode)
        run: bash tests/git.sh

      - name: Integration tests (mode interactions)
        run: bash tests/modes.sh

      - name: Integration tests (security guards)
        run: bash tests/security.sh
